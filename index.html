<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>java training</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Overpass:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="card">
      <div class="main-card">
        <img class="logo-imge" src="images/logo.svg" />
        <div class="main-title"><span>WE`RE</span> COMING SOON</div>
        <div class="disc">
          hello fellow shoppers! We`re currntly bulding our new fashion
          store.Add your email below to stay up-to-date with announcements and
          our lunch deals.
        </div>
        <div class="search-bar-container">
          <input
            class="search-bar"
            id="search-bar"
            type="email"
            placeholder="Email Address"
          />
          <img class="warning" id="warningg" src="images/icon-error.svg" />
          <button class="submit-btn" id="submit-btn">
            <img src="images/icon-arrow.svg" alt="submit" />
          </button>
        </div>
        <div class="warning-text-container" id="warning-text-container">
          <p>please provide a valid email</p>
        </div>
      </div>
      <aside class="side-img"><img src="images/hero-desktop.jpg" /></aside>
    </div>
    <div class="confirmation-card" id="confirm-modal">
      <div class="confirmation-container">
        <h1 class="confirm-title" id="modal-title">are you a robot ?</h1>
        <p class="requst" id="modal-text">please if you are not a robot press ok to confirm</p>
        <div class="confirm-btn"><button id="ok-btn">ok</button> <button id="cancel-btn">cancel</button></div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
